---
- name: Configurar EC2 de prueba y levantar entorno con Docker Compose
  hosts: ec2_prueba
  become: yes
  tasks:
    - name: Actualizar cache de apt
      apt:
        update_cache: yes

    - name: Instalar dependencias base para Docker
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - rsync
        state: present

    - name: Descargar clave GPG oficial de Docker
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Agregar repositorio oficial de Docker
      apt_repository:
        # Usa la version de Ubuntu detectada automaticamente (focal, jammy, noble, etc.)
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Instalar Docker y Docker Compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Asegurar que el servicio Docker este iniciado
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Crear directorio para el Sistema de Reservas
      file:
        path: /opt/sistema-reservas
        state: directory
        mode: '0755'

    - name: Sincronizar el codigo fuente de la app al servidor EC2
      # synchronize usa rsync (mucho mas rapido que copy para directorios grandes)
      # Excluye node_modules y .next para que Docker los genere dentro del contenedor
      synchronize:
        src: ../app
        dest: /opt/sistema-reservas/
        rsync_opts:
          - "--exclude=node_modules"
          - "--exclude=.next"
          - "--exclude=dist"
          - "--exclude=.env"

    - name: Copiar docker-compose al servidor EC2
      copy:
        src: ../docker-compose.yml
        dest: /opt/sistema-reservas/docker-compose.yml

    - name: Levantar los contenedores con Docker Compose
      command: docker compose up -d --build
      args:
        chdir: /opt/sistema-reservas
