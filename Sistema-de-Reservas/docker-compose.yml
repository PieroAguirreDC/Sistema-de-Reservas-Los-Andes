version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: reservas-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reservas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./app/api
      dockerfile: Dockerfile.dev
    container_name: reservas-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: reservas_db
      NODE_ENV: development
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./app/api:/app
      - /app/node_modules
    depends_on:
      - postgres

volumes:
  postgres_data: