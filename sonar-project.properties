# Identificador del proyecto
sonar.projectKey=hotel-losandes
sonar.projectName=Sistema de Reservas Hotel Los Andes
sonar.projectVersion=1.0

# Código fuente — analizar la API NestJS y el frontend
sonar.sources=Sistema-de-Reservas/app/api/src,Sistema-de-Reservas/app/web/src

# Excluir archivos que no necesitan análisis
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.spec.ts,**/*.test.ts,**/coverage/**

# TypeScript
sonar.typescript.tsconfigPath=Sistema-de-Reservas/app/api/tsconfig.json

# Codificación
sonar.sourceEncoding=UTF-8

# URL del servidor SonarQube
sonar.host.url=http://localhost:9000