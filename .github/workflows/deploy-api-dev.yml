name: Deploy API dev (microservicios)

on:
  push:
    branches:
      - develop
      - main
    paths:
      - "Sistema-de-Reservas/app/api/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2

jobs:

  deploy:
    name: Desplegar ${{ matrix.service }}
    runs-on: ubuntu-latest
    environment: dev

    strategy:
      fail-fast: false
      matrix:
        service: [usuarios, habitaciones, reservas, pagos, notificaciones]
        include:
          - service: usuarios
            ecr_repo: api-usuarios
            container_name: usuarios
            path: app/ms-usuarios
          - service: habitaciones
            ecr_repo: api-habitaciones
            container_name: habitaciones
            path: app/ms-habitaciones
          - service: reservas
            ecr_repo: api-reservas
            container_name: reservas
            path: app/ms-reservas
          - service: pagos
            ecr_repo: api-pagos
            container_name: pagos
            path: app/ms-pagos
          - service: notificaciones
            ecr_repo: api-notificaciones
            container_name: notificaciones
            path: app/ms-notificaciones

    steps:
      - name: checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: configurar node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: Sistema-de-Reservas/${{ matrix.path }}/package-lock.json

      - name: instalar dependencias de la api
        working-directory: Sistema-de-Reservas/${{ matrix.path }}
        run: npm ci

      - name: ejecutar pruebas unitarias
        working-directory: Sistema-de-Reservas/${{ matrix.path }}
        run: npm run test -- --passWithNoTests

      - name: autenticacion oidc con aws
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: login en aws ecr
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: verificar o crear repositorio ecr
        run: |
          aws ecr describe-repositories --repository-names ${{ matrix.ecr_repo }} \
            --region ${{ env.AWS_REGION }} 2>/dev/null || \
          aws ecr create-repository --repository-name ${{ matrix.ecr_repo }} \
            --region ${{ env.AWS_REGION }} \
            --image-scanning-configuration scanOnPush=true \
            --encryption-configuration encryptionType=AES256

      - name: construir, etiquetar y pushear imagen a ecr
        id: build-imagen
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/${{ matrix.ecr_repo }}:$IMAGE_TAG \
            -f Sistema-de-Reservas/${{ matrix.path }}/Dockerfile \
            Sistema-de-Reservas/
          docker push $ECR_REGISTRY/${{ matrix.ecr_repo }}:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/${{ matrix.ecr_repo }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: descargar la definicion de tarea actual desde ecs
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ vars.ECS_CLUSTER }}-${{ matrix.service }} \
            --query taskDefinition > task-definition.json

      - name: inyectar la nueva imagen y variables de entorno en la definicion
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ matrix.container_name }}
          image: ${{ steps.build-imagen.outputs.image }}
          environment-variables: |
            NODE_ENV=production
            PORT=3000
            DB_HOST=${{ vars.RDS_PROXY_ENDPOINT }}
            DB_PORT=5432
            DB_NAME=${{ vars.AURORA_DB_NAME }}
            DB_SSL=true
            REDIS_HOST=${{ vars.REDIS_PRIMARY_ENDPOINT }}
            REDIS_PORT=6379
            REDIS_AUTH_TOKEN=${{ secrets.REDIS_AUTH_TOKEN }}
            SECRET_ARN=${{ vars.SECRET_RDS_ARN }}
            SERVICE_NAME=${{ matrix.service }}

      - name: desplegar nueva version en aws ecs
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          cluster: ${{ vars.ECS_CLUSTER }}
          service: ${{ vars.ECS_CLUSTER }}-${{ matrix.service }}-svc
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          wait-for-service-stability: true
