name: SonarQube Analysis

on:
  push:
    branches:
      - develop
      - main
    paths:
      - "Sistema-de-Reservas/app/**"
  pull_request:
    branches:
      - develop
  workflow_dispatch:

jobs:
  sonarqube:
    name: Analisis de calidad con SonarQube
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: Sistema-de-Reservas/app/api/package-lock.json

      - name: Instalar dependencias y ejecutar pruebas
        working-directory: Sistema-de-Reservas/app
        run: |
          for dir in ms-usuarios ms-habitaciones ms-reservas ms-pagos ms-notificaciones libs/common; do
            echo "Procesando $dir..."
            cd $dir
            npm ci
            if [ -f "package.json" ] && grep -q '"test:cov"' "package.json"; then
              npm run test:cov -- --passWithNoTests || true
            fi
            cd - > /dev/null
          done

      - name: Ejecutar analisis de SonarQube
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.organization=SDRDHS
            -Dsonar.projectKey=hotel-losandes
            -Dsonar.projectName="Sistema de Reservas Hotel Los Andes"
            -Dsonar.sources=Sistema-de-Reservas/app/ms-usuarios/src,Sistema-de-Reservas/app/ms-habitaciones/src,Sistema-de-Reservas/app/ms-reservas/src,Sistema-de-Reservas/app/ms-pagos/src,Sistema-de-Reservas/app/ms-notificaciones/src,Sistema-de-Reservas/app/libs/common/src,Sistema-de-Reservas/app/web/src
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/*.spec.ts,**/coverage/**
            -Dsonar.typescript.tsconfigPaths=Sistema-de-Reservas/app/ms-usuarios/tsconfig.json,Sistema-de-Reservas/app/ms-habitaciones/tsconfig.json,Sistema-de-Reservas/app/ms-reservas/tsconfig.json,Sistema-de-Reservas/app/ms-pagos/tsconfig.json,Sistema-de-Reservas/app/ms-notificaciones/tsconfig.json,Sistema-de-Reservas/app/libs/common/tsconfig.json

      - name: Verificar Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}